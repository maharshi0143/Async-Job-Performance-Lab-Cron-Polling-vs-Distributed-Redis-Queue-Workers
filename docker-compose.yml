version: "3.9"

x-app-env: &app-env
  DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_processing?schema=public
  REDIS_HOST: redis
  REDIS_PORT: 6379
  CRON_INTERVAL_MS: "10000"
  ADVISORY_LOCKING_ENABLED: "true"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_processing
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: ["server.js"]
    ports:
      - "3000:3000"
    environment:
      <<: *app-env
      PORT: "3000"
      SERVICE_NAME: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  cron-worker:
    build: .
    command: ["src/workers/cron.worker.js"]
    environment:
      <<: *app-env
      SERVICE_NAME: cron-worker
    depends_on:
      postgres:
        condition: service_healthy

  queue-worker:
    build: .
    command: ["src/workers/queue.worker.js"]
    environment:
      <<: *app-env
      SERVICE_NAME: queue-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
